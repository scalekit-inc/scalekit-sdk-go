syntax = "proto3";

package scalekit.v1.errdetails;

import "google/api/annotations.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/scalekit-inc/scalekit/pkg/grpc/errdetails";

message ErrorInfo {
  string error_code = 1;
  optional DebugInfo debug_info = 2;
  optional HelpInfo help_info = 3;
  optional LocalizedMessageInfo localized_message_info = 4;
  optional ResourceInfo resource_info = 5;
  optional RequestInfo request_info = 6;
  optional ValidationErrorInfo validation_error_info = 8;
  optional ToolErrorInfo tool_error_info = 9;
}

// Describes additional debugging info.
message DebugInfo {
  // The stack trace entries indicating where the error occurred.
  repeated string stack_entries = 1;

  // Additional debugging information provided by the server.
  string detail = 2;
}

// Describes violations in a client request. This error type focuses on the
// syntactic aspects of the request.
message ValidationErrorInfo {
  // A message type used to describe a single bad request field.
  message FieldViolation {
    string field = 1;
    // A description of why the request element is bad.
    string description = 2;

    string constraint = 3;
  }

  // Describes all violations in a client request.
  repeated FieldViolation field_violations = 1;
}

// Contains metadata about the request that clients can attach when filing a bug
// or providing other forms of feedback.
message RequestInfo {
  // An opaque string that should only be interpreted by the service generating
  // it. For example, it can be used to identify requests in the service's logs.
  string request_id = 1;

  // Any data that was used to serve this request. For example, an encrypted
  // stack trace that can be sent back to the service provider for debugging.
  string serving_data = 2;
}

// Describes the resource that is being accessed.
message ResourceInfo {
  reserved 1;
  string resource_name = 2;
  string owner = 3;

  // Describes what error is encountered when accessing this resource.
  // For example, updating a cloud project may require the `writer` permission
  // on the developer console project.
  string description = 4;

  // The required permissions needed to access the resource.
  repeated string required_permissions = 5;

  string user = 6;
}

// HelpInfo provides documentation links attached to an error response.
// When present in ErrorInfo, clients should surface these links to help
// developers resolve the error. For example, a missing required field error
// may include a link to the relevant guide.
message HelpInfo {
  // A documentation or reference link.
  message Link {
    // Human-readable label for the link (e.g. "User verification flow").
    string description = 1;
    // Absolute URL to the documentation page (e.g. "https://docs.scalekit.com/...").
    string url = 2;
  }
  // One or more links relevant to resolving the error.
  repeated Link links = 1;
}

message LocalizedMessageInfo {
  string locale = 1;
  string message = 2;
}

message ToolErrorInfo {
  string execution_id = 1;
  string tool_error_message = 2;
  string tool_error_code = 3;
}

service Dummy {
  rpc DummyService(google.protobuf.Empty) returns (ErrorInfo) {
    option (google.api.http) = {get: "/dummy"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      responses: {
        key: "200"
        value: {
          schema: {
            json_schema: {ref: ".scalekit.v1.errdetails.ErrorInfo"}
          }
        }
      }
    };
  }
}
