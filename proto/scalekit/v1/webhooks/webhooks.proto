syntax = "proto3";

package scalekit.v1.webhooks;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/visibility.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "scalekit/v1/options/options.proto";

option go_package = "github.com/scalekit-inc/scalekit/pkg/grpc/webhooks";

service WebhookService {
  rpc GetPortalURL(GetPortalURLRequest) returns (GetPortalURLResponse) {
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.http) = {get: "/api/v1/webhooks/portal-url"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get webhook portal URL"
      description: "Retrieves the portal URL for webhook configuration"
      responses: {
        key: "200"
        value: {
          description: "Portal URL retrieved successfully"
          schema: {
            json_schema: {ref: ".scalekit.v1.webhooks.GetPortalURLResponse"}
          }
        }
      }
    };
  }
  rpc WebhookWrapper(WebhookWrapperRequest) returns (google.protobuf.Struct) {
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE};
    option (google.api.http) = {
      get: "/api/v1/webhooks/wb/**"
      additional_bindings: {
        post: "/api/v1/webhooks/wb/**"
        body: "request_body"
      }
      additional_bindings: {
        put: "/api/v1/webhooks/wb/**"
        body: "request_body"
      }
      additional_bindings: {
        patch: "/api/v1/webhooks/wb/**"
        body: "request_body"
      }
      additional_bindings: {delete: "/api/v1/webhooks/wb/**"}
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Webhook wrapper"
      description: "Wrapper endpoint for webhook requests supporting multiple HTTP methods"
      responses: {
        key: "200"
        value: {
          description: "Request processed successfully"
          schema: {
            json_schema: {ref: ".google.protobuf.Struct"}
          }
        }
      }
    };
  }

  rpc SendTestEvent(SendTestEventRequest) returns (SendTestEventResponse) {
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.http) = {post: "/api/v1/webhooks/test-event/{event_type}"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Send test webhook event"
      description: "Sends a test webhook event of the specified type"
      responses: {
        key: "200"
        value: {
          description: "Test event sent successfully"
          schema: {
            json_schema: {ref: ".scalekit.v1.webhooks.SendTestEventResponse"}
          }
        }
      }
    };
  }

  rpc SendWebhookEvent(WebhookEvent) returns (Empty) {
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {
      post: "/webhooks"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Send webhook event"
      description: "Receives a webhook event payload and processes it"
      responses: {
        key: "200"
        value: {description: "Webhook event received successfully"}
      }
    };
  }
}

message SendTestEventRequest {
  string event_type = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
}

message SendTestEventResponse {
  string event_type = 1;
  google.protobuf.Struct event_payload = 2;
}

message GetPortalURLRequest {}

message GetPortalURLResponse {
  string url = 1;
}

message WebhookWrapperRequest {
  optional google.protobuf.Struct request_body = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "Request body payload. Only used for POST, PUT, and PATCH methods."}];
}

message WebhookWrapperResponse {
  google.protobuf.Struct response_body = 1;
}

// Generic event wrapper, useful for routing and versioning.
message WebhookEvent {
  string spec_version = 1;
  string id = 2 [(buf.validate.field).string = {
    prefix: "evt_"
    min_len: 1
    max_len: 32
  }];
  ObjectType object = 3;
  google.protobuf.Timestamp occurred_at = 4;
  string environment_id = 6 [(buf.validate.field).string = {
    prefix: "env_"
    min_len: 1
    max_len: 32
  }];
  optional string organization_id = 5 [(buf.validate.field).string = {
    prefix: "org_"
    min_len: 1
    max_len: 32
  }];
  EventType type = 7;
  oneof data {
    OrganizationEventData organization = 8;
    UserEventData user = 9;
  }
}

enum ObjectType {
  OBJECT_TYPE_UNSPECIFIED = 0;
  ORGANIZATION = 1;
  USER = 2;
  DIRECTORY_USER = 3;
  CONNECTION = 4;
  DIRECTORY = 5;
}

enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;

  // Organization events
  ORGANIZATION_CREATED = 1;
  ORGANIZATION_UPDATED = 2;
  ORGANIZATION_DELETED = 3;

  // User events
  USER_SIGNUP = 4;
  USER_LOGIN = 5;
  USER_LOGOUT = 6;
  USER_ORGANIZATION_INVITATION = 7;
  USER_ORGANIZATION_MEMBERSHIP_CREATED = 8;
  USER_ORGANIZATION_MEMBERSHIP_UPDATED = 9;
  USER_ORGANIZATION_MEMBERSHIP_DELETED = 10;
}

message Empty {}

// Organization event data structure
message OrganizationEventData {
  string id = 1 [(buf.validate.field).string = {
    prefix: "org_"
    min_len: 1
    max_len: 32
  }];
  optional string external_id = 2;
  optional google.protobuf.Struct metadata = 3;
  OrganizationSettings settings = 4;
}

message OrganizationSettings {
  repeated FeatureFlag features = 1;
}

message FeatureFlag {
  bool enabled = 1;
  string name = 2;
}

// User event data structures
message UserEventData {
  string id = 1 [(buf.validate.field).string = {
    prefix: "usr_"
    min_len: 1
    max_len: 32
  }];
  string email = 2;
  optional string external_id = 3;
  UserProfile profile = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  optional OrganizationReference organization = 7;
}

message UserProfile {
  optional string given_name = 1;
  optional string family_name = 2;
  optional string picture = 3;
  bool email_verified = 4;
}

message OrganizationReference {
  string id = 1 [(buf.validate.field).string = {
    prefix: "org_"
    min_len: 1
    max_len: 32
  }];
  optional string external_id = 2;
}
