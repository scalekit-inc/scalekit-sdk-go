syntax = "proto3";

package scalekit.v1.auditlogs;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/visibility.proto";
import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "scalekit/v1/options/options.proto";

option go_package = "github.com/scalekit-inc/scalekit/pkg/grpc/auditlogs";

service AuditLogsService {
  rpc ListAuthRequests(ListAuthLogRequest) returns (ListAuthLogResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.http) = {get: "/api/v1/logs/authentication/requests"};
    option (google.api.method_visibility).restriction = "PREVIEW";
  }
}

message ListAuthLogRequest {
  uint32 page_size = 1;
  string page_token = 2;
  string email = 3;
  repeated string status = 4;
  google.protobuf.Timestamp start_time = 5;
  google.protobuf.Timestamp end_time = 6;
  string resource_id = 7;
  string connected_account_identifier = 8;
  string client_id = 9 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Filter authentication logs by client ID"
    example: "\"skc_1234567890\""
  }];
}

message ListAuthLogResponse {
  string next_page_token = 1;
  string prev_page_token = 2;
  uint32 total_size = 3;
  repeated AuthLogRequest authRequests = 4;
}

message AuthLogRequest {
  string organization_id = 1;
  string environment_id = 2;
  string connection_id = 3;
  string auth_request_id = 4;
  string email = 5;
  string connection_type = 6;
  string connection_provider = 7;
  string status = 8;
  google.protobuf.Timestamp timestamp = 9;
  repeated ConnectionDetails connection_details = 10;
  string workflow = 11;
  string resource_id = 12;
  string resource_name = 13;
  string resource_type = 14;
  string connected_account_identifier = 15;
  string client_id = 16 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Unique identifier of the client associated with this authentication event"
    example: "\"skc_1234567890\""
  }];
  string client_name = 17 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Display name of the client"
    example: "\"Default\""
  }];
  string client_type = 18 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Type of the client application (e.g., ENV, NTV, SPA, M2M)"
    example: "\"ENV\""
  }];
}

message ConnectionDetails {
  string connection_id = 1;
  string organization_id = 2;
  string connection_type = 3;
  string connection_provider = 4;
}
