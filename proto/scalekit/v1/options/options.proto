syntax = "proto3";

package scalekit.v1.options;

import "google/protobuf/descriptor.proto";

option go_package = "github.com/scalekit-inc/scalekit/pkg/grpc/authoption";

extend google.protobuf.MethodOptions {
  AuthOption auth_option = 50000;
}

message AuthOption {
  AuthenticationType authentication_type = 3;
  repeated string permissions = 1;
  Policy policy = 2;
}

enum Policy {
  DENY = 0;
  PARTIAL = 1;
  ALLOW = 2;
}

enum AuthenticationType {
  // API is Blocked to access
  BLOCKED = 0; // API is blocked / private  and default
  NONE = 1; // API is open
  // Workspace auth option is for Scalekit Dashboard
  WORKSPACE = 64; // workspace_id is in claims
  // Customer portal is for customer admin portal access
  CUSTOMER_PORTAL = 32; // claims has organisation ID
  // (UI audience in claims) this is for API that need to work on env.scalekit.com scoped access alone.
  SESSION = 16;
  WORKSPACE_SESSION = 80;
  WORKSPACE_CLIENT = 68; // workspace_id is in claims and UI in audience
  WORKSPACE_SESSION_CUSTOMER_PORTAL = 112;
  WORKSPACE_SESSION_CUSTOMER_PORTAL_CLIENT = 116; // workspace_id,organization_id is in claims and UI in audience
  WORKSPACE_CUSTOMER_PORTAL_CLIENT = 100;
  WORKSPACE_CUSTOMER_PORTAL = 96; // workspace_id,organization_id is in claims and client Id is in subject
  USER = 8; // user_id is in claims
  // client is environment primary client ID
  CLIENT = 4; // client Id is in subject
  SESSION_CLIENT = 20; // UI in audience or client Id is in subject
  WORKSPACE_SESSION_CLIENT = 84; // workspace_id is in claims, UI in audience and client Id is in subject
  CUSTOMER_PORTAL_SESSION_CLIENT = 52; // claims has organisation ID, UI in audience and client Id is in subject
  SESSION_USER = 24;
  ACTIONS_PORTAL = 128;
  WORKSPACE_SESSION_CUSTOMER_PORTAL_ACTIONS_PORTAL = 240; // workspace_id,organization_id is in claims and UI in audience
  WORKSPACE_SESSION_CUSTOMER_PORTAL_ACTIONS_PORTAL_CLIENT = 244; // workspace_id,organization_id is in claims, UI in audience and client Id is in subject
  WORKSPACE_ACTIONS_PORTAL = 192; // workspace_id is in claims and UI in audience
  WORKSPACE_ACTIONS_PORTAL_CLIENT = 196; // workspace_id is in claims, UI in audience and client Id is in subject
  WORKSPACE_ACTIONS_PORTAL_CUSTOMER_PORTAL_CLIENT = 228;
  WORKSPACE_CUSTOMER_PORTAL_ACTIONS_PORTAL = 224; // workspace_id,organization_id is in claims and UI in audience
}
