syntax = "proto3";

package scalekit.v1.secrets;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/visibility.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "scalekit/v1/commons/commons.proto";
import "scalekit/v1/options/options.proto";

option go_package = "github.com/scalekit-inc/scalekit/pkg/grpc/secrets";

service SecretService {
  rpc CreateSecret(CreateSecretRequest) returns (CreateSecretResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {
      post: "/api/v1/secrets"
      body: "secret"
    };
  }

  rpc RotateSecret(RotateSecretRequest) returns (RotateSecretResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {post: "/api/v1/secrets/{id}:rotate"};
  }

  rpc GetSecret(GetSecretRequest) returns (GetSecretResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {get: "/api/v1/secrets/{id}"};
  }

  rpc ListSecrets(ListSecretsRequest) returns (ListSecretsResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {get: "/api/v1/secrets"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List secrets"
      description: "List available secrets"
    };
  }

  rpc DeleteSecret(DeleteSecretRequest) returns (google.protobuf.Empty) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {delete: "/api/v1/secrets/{id}"};
  }
}

message CreateSecretRequest {
  CreateSecret secret = 1 [(buf.validate.field).required = true];
}

message CreateSecret {
  SecretType secret_type = 1 [
    (buf.validate.field).enum.defined_only = true,
    (buf.validate.field).enum.not_in = 0
  ];
  TenantType tenant_type = 2 [
    (buf.validate.field).enum.defined_only = true,
    (buf.validate.field).enum.not_in = 0
  ];
}

enum SecretType {
  SECRET_TYPE_UNSPECIFIED = 0;
  INTERCEPTOR_HMAC = 1;
  DIRECTORY_TOKEN = 2;
}

enum TenantType {
  TENANT_TYPE_UNSPECIFIED = 0;
  INTERCEPTOR = 1;
  DIRECTORY = 2;
}

message CreateSecretResponse {
  Secret secret = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "The new HMAC secret"}];
}

message RotateSecretRequest {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 32
      prefix: "sec_"
    },
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Secret ID"
      example: "\"sec_91735381321449672\""
    }
  ];
}

message RotateSecretResponse {
  Secret secret = 1;
}

message GetSecretRequest {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 32
      prefix: "sec_"
    },
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Secret ID"
      example: "\"sec_91735381321449672\""
    }
  ];
  bool include_plaintext_secret = 2;
}

message GetSecretResponse {
  Secret secret = 1;
}

message ListSecretsRequest {
  SecretType secret_type = 1 [(buf.validate.field).enum.defined_only = true];
}

message DeleteSecretRequest {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 32
      prefix: "sec_"
    },
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Secret ID"
      example: "\"sec_91735381321449672\""
    }
  ];
}

message ListSecretsResponse {
  repeated Secret secret = 1;
}

message Secret {
  string id = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  TenantType tenant_type = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
  SecretType secret_type = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
  string secret_suffix = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
  optional string plaintext_secret = 5 [(google.api.field_behavior) = OUTPUT_ONLY];
  google.protobuf.Timestamp created_at = 6 [(google.api.field_behavior) = OUTPUT_ONLY];
  google.protobuf.Timestamp last_used_at = 7 [(google.api.field_behavior) = OUTPUT_ONLY];
  google.protobuf.Timestamp expires_at = 8 [(google.api.field_behavior) = OUTPUT_ONLY];
}
