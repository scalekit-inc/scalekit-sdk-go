syntax = "proto3";

package scalekit.v1.organizations;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/visibility.proto";
import "google/protobuf/any.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "scalekit/v1/commons/commons.proto";
import "scalekit/v1/options/options.proto";

option go_package = "github.com/scalekit-inc/scalekit/pkg/grpc/organizations";
// {{import \"proto/scalekit/v1/getting_started.md\"}}
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Scalekit APIs"
    version: "1.0.0"
    // {{import \"proto/scalekit/v1/getting_started.md\"}}
    // This is copy of the content from proto/scalekit/v1/getting_started.md .
    // The go MD comments processor does not work with just this description field..
    // It can be used else where. So putting in raw content in a single line text i
    // The following content is the output of command  `cat proto/scalekit/v1/getting_started.md | sed -e 's/\\/\\\\/g' | sed -e 's/"/\\"/g' | awk 1 ORS='\\n'`
    description: "# Introduction\n\nThe Scalekit API is a RESTful API that enables you to manage organizations, users, and authentication settings. All requests must use HTTPS.\nAll API requests use the following base URLs:\n\n```\nhttps://{environment}.scalekit.dev (Development)\nhttps://{environment}.scalekit.com (Production)\nhttps://auth.example.com (Custom domain)\n```\n\nScalekit operates two separate environments: Development and Production. Resources cannot be moved between environments.\n\n# Authentication\n\nThe Scalekit API uses OAuth 2.0 Client Credentials for authentication.\n\nCopy your API credentials from the Scalekit dashboard's API Config section and set them as environment variables.\n\n```sh\nSCALEKIT_ENVIRONMENT_URL='<YOUR_ENVIRONMENT_URL>'\nSCALEKIT_CLIENT_ID='<ENVIRONMENT_CLIENT_ID>'\nSCALEKIT_CLIENT_SECRET='<ENVIRONMENT_CLIENT_SECRET>'\n```\n\nGetting an access token\n\n1. Get your credentials from the [Scalekit Dashboard](https://app.scalekit.com)\n2. Request an access token:\n\n```sh\ncurl https://{SCALEKIT_ENVIRONMENT_URL}/oauth/token \\\n  -X POST \\\n  -H 'Content-Type: application/x-www-form-urlencoded' \\\n  -d 'client_id={client_id}' \\\n  -d 'client_secret={client_secret}' \\\n  -d 'grant_type=client_credentials'\n```\n\n3. Use the access token in API requests:\n\n```sh\ncurl https://{SCALEKIT_ENVIRONMENT_URL}/api/v1/organizations \\\n  -H 'Content-Type: application/json' \\\n  -H 'Authorization: Bearer {access_token}'\n```\n\nThe response includes an access token:\n\n```json\n{\n	\"access_token\": \"eyJhbGciOiJSUzI1NiIsImtpZCI6InNua181Ok4OTEyMjU2NiIsInR5cCI6IkpXVCJ9...\",\n	\"token_type\": \"Bearer\",\n	\"expires_in\": 86399,\n	\"scope\": \"openid\"\n}\n```\n\n# SDKs\n\nScalekit provides official SDKs for multiple programming languages. Check the changelog at GitHub repositories for the latest updates.\n\n### Node.js\n\n```sh\nnpm install @scalekit-sdk/node\n```\n\nCreate a new Scalekit client instance after initializing the environment variables\n\n```js\nimport { Scalekit } from \"@scalekit-sdk/node\";\n\nexport let scalekit = new Scalekit(\n	process.env.SCALEKIT_ENVIRONMENT_URL,\n	process.env.SCALEKIT_CLIENT_ID,\n	process.env.SCALEKIT_CLIENT_SECRET\n);\n```\n\n[See the Node SDK changelog](https://github.com/scalekit-inc/scalekit-sdk-node/releases)\n\n### Python\n\n```sh\npip install scalekit-sdk-python\n```\n\nCreate a new Scalekit client instance after initializing the environment variables.\n\n```py\nfrom scalekit import ScalekitClient\nimport os\n\nscalekit_client = ScalekitClient(\n    os.environ.get('SCALEKIT_ENVIRONMENT_URL'),\n    os.environ.get('SCALEKIT_CLIENT_ID'),\n    os.environ.get('SCALEKIT_CLIENT_SECRET')\n)\n```\n\n[See the Python SDK changelog](https://github.com/scalekit-inc/scalekit-sdk-python/releases)\n\n### Go\n\n```sh\ngo get -u github.com/scalekit-inc/scalekit-sdk-go\n```\n\nCreate a new Scalekit client instance after initializing the environment variables.\n\n```go\npackage main\n\nimport (\n    \"os\"\n    \"github.com/scalekit-inc/scalekit-sdk-go\"\n)\n\nscalekitClient := scalekit.NewScalekitClient(\n    os.Getenv(\"SCALEKIT_ENVIRONMENT_URL\"),\n    os.Getenv(\"SCALEKIT_CLIENT_ID\"),\n    os.Getenv(\"SCALEKIT_CLIENT_SECRET\"),\n)\n```\n\n[See the Go SDK changelog](https://github.com/scalekit-inc/scalekit-sdk-go/releases)\n\n### Java\n\n```gradle\n/* Gradle users - add the following to your dependencies in build file */\nimplementation \"com.scalekit:scalekit-sdk-java:2.0.6\"\n```\n\n```xml\n<!-- Maven users - add the following to your `pom.xml` -->\n<dependency>\n    <groupId>com.scalekit</groupId>\n    <artifactId>scalekit-sdk-java</artifactId>\n    <version>2.0.6</version>\n</dependency>\n```\n\n[See the Java SDK changelog](https://github.com/scalekit-inc/scalekit-sdk-java/releases)\n\n# Error handling\n\nThe API uses standard HTTP status codes:\n\n| Code        | Description          |\n| ----------- | -------------------- |\n| 200/201     | Success              |\n| 400         | Invalid request      |\n| 401         | Authentication error |\n| 404         | Resource not found   |\n| 429         | Rate limit exceeded  |\n| 500/501/504 | Server error         |\n\nError responses include detailed information:\n\n```json\n{\n	\"code\": 16,\n	\"message\": \"Token empty\",\n	\"details\": [\n		{\n			\"@type\": \"type.googleapis.com/scalekit.v1.errdetails.ErrorInfo\",\n			\"error_code\": \"UNAUTHENTICATED\"\n		}\n	]\n}\n```\n\n"
    contact: {
      name: "Scalekit Inc"
      url: "https://scalekit.com"
      email: "support@scalekit.com"
    }
    license: {
      name: "Apache 2.0"
      url: "http://www.apache.org/licenses/LICENSE-2.0"
    }
  }
  host: "$SCALEKIT_ENVIRONMENT_URL"
  schemes: HTTPS
  consumes: "application/json"
  produces: "application/json"
  external_docs: {
    description: "Scalekit Docs"
    url: "https://docs.scalekit.com/"
  }

  /**
     // Disabled for now as it is not working with Scalar.
     security_definitions: {
       security: {
         key: "BasicAuth"
         value: {type: TYPE_BASIC}
       }
       security: {
         key: "OAuth2"
         value: {
           type: TYPE_OAUTH2
           flow: FLOW_ACCESS_CODE
           token_url: "http://$ENV_URL/oauth/token"
           authorization_url: "http://$ENV_URL/oauth/authorize"
           scopes: {
             scope: {
               key: "offline_access"
               value: "Grants a refresh token with absolute expiry"
             }
           }
         }
       }
     }
  */

  /* The following does not work for Scalar .. But works fine with Redocly */
  /* { name: "Scalekit API", description: "{{import \"proto/scalekit/v1/getting_started.md\"}}", },*/
  tags: [
    {name: "Organizations"},
    {
      name: "Permissions"
      description: "Permission management for defining and controlling access to system resources. Create, retrieve, update, and delete granular permissions that represent specific actions users can perform. Permissions are the building blocks of role-based access control (RBAC) and can be assigned to roles to grant users the ability to perform specific operations. Use this service to define custom permissions for your application's unique access control requirements."
    }
  ]
};

service OrganizationService {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {
    name: "Organizations"
    // Imported description from a markdown file can be added here in service or as a Tag description in the above section
    description: "{{import \"proto/scalekit/v1/organizations/organization_details.md\"}}"
  };

  // Create Organization
  rpc CreateOrganization(CreateOrganizationRequest) returns (CreateOrganizationResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};

    option (google.api.http) = {
      post: "/api/v1/organizations"
      body: "organization"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organizations"
      summary: "Create an organization"
      description: "Creates a new organization in your environment. Use this endpoint to add a new tenant that can be configured with various settings and metadata"

      responses: {
        key: "201"
        value: {
          description: "Returns the newly created organization with its unique identifier and settings"
          schema: {
            json_schema: {ref: ".scalekit.v1.organizations.CreateOrganizationResponse"}
          }
        }
      }
    };
  }

  rpc UpdateOrganization(UpdateOrganizationRequest) returns (UpdateOrganizationResponse) {
    option (scalekit.v1.options.auth_option) = {
      authentication_type: WORKSPACE_SESSION_CLIENT
      permissions: ["organizations_write"]
    };

    option (google.api.http) = {
      patch: "/api/v1/organizations/{id}"
      body: "organization"

      // Hiding the access directly with external_id as it requires separate rpc method defined
      // additional_bindings: {
      //   patch: "/api/v1/organizations:external/{external_id}"
      //   body: "organization"
      // }
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organizations"
      summary: "Update organization details"
      description: "Updates an organization's display name, external ID, or metadata. Requires a valid organization identifier. Region code cannot be modified through this endpoint."
      responses: {
        key: "200"
        value: {
          description: "Returns the updated organization with all current details reflected in the response."
          schema: {
            json_schema: {ref: ".scalekit.v1.organizations.UpdateOrganizationResponse"}
          }
        }
      }
    };
  }

  rpc GetOrganization(GetOrganizationRequest) returns (GetOrganizationResponse) {
    option (scalekit.v1.options.auth_option) = {
      authentication_type: WORKSPACE_SESSION_CUSTOMER_PORTAL_CLIENT
      permissions: ["organizations_read"]
    };
    option (google.api.http) = {get: "/api/v1/organizations/{id}"};

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organizations"
      summary: "Get organization details"
      description: "Retrieves organization details by Scalekit ID, including name, region, metadata, and settings"

      responses: {
        key: "200"
        value: {
          description: "Returns the complete organization object with ID, display name, settings, and metadata"
          schema: {
            json_schema: {ref: ".scalekit.v1.organizations.GetOrganizationResponse"}
          }
        }
      }
    };
  }

  rpc GetOrganizationByExternalId(GetOrganizationRequest) returns (GetOrganizationResponse) {
    option (scalekit.v1.options.auth_option) = {
      authentication_type: CLIENT
      permissions: ["organizations_read"]
    };
    option (google.api.http) = {get: "/api/v1/organizations:external/{external_id}"};

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organizations"
      summary: "Get organization details by external Id"
      description: "Retrieves organization details by External ID, including name, region, metadata, and settings"

      responses: {
        key: "200"
        value: {
          description: "Returns the complete organization object with ID, display name, settings, external ID and metadata"
          schema: {
            json_schema: {ref: ".scalekit.v1.organizations.GetOrganizationResponse"}
          }
        }
      }
      responses: {
        key: "400"
        value: {description: "Invalid request - external ID is empty or the caller's organization claim does not match"}
      }
      responses: {
        key: "404"
        value: {description: "Organization not found - no organization exists with the specified external ID"}
      }
    };
  }

  rpc ListOrganization(ListOrganizationsRequest) returns (ListOrganizationsResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.http) = {get: "/api/v1/organizations"};

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organizations"
      summary: "List organizations"
      description: "Retrieve a paginated list of organizations within your environment. The response includes a `page_token` that can be used to access subsequent pages of results."
      responses: {
        key: "200"
        value: {
          description: "Successfully retrieved the list of organizations"
          schema: {
            json_schema: {ref: ".scalekit.v1.organizations.ListOrganizationsResponse"}
          }
        }
      }
      responses: {
        key: "400"
        value: {description: "Invalid page token"}
      }
      extensions: {
        key: "x-codeSamples"
        value: {
          list_value: {
            values: [
              {
                struct_value: {
                  fields: {
                    key: "lang"
                    value: {string_value: "javascript"}
                  }
                  fields: {
                    key: "label"
                    value: {string_value: "Node.js SDK"}
                  }
                  fields: {
                    key: "source"
                    value: {string_value: "const organizations = await scalekit.organization.listOrganization({\n  pageSize: 10,\n});"}
                  }
                }
              },
              {
                struct_value: {
                  fields: {
                    key: "lang"
                    value: {string_value: "python"}
                  }
                  fields: {
                    key: "label"
                    value: {string_value: "Python SDK"}
                  }
                  fields: {
                    key: "source"
                    value: {string_value: "options = ListOrganizationOptions()\noptions.page_size = 10\n\norganizations = sc.organization.list_organizations(\n  options=options\n)"}
                  }
                }
              },
              {
                struct_value: {
                  fields: {
                    key: "lang"
                    value: {string_value: "go"}
                  }
                  fields: {
                    key: "label"
                    value: {string_value: "Go SDK"}
                  }
                  fields: {
                    key: "source"
                    value: {string_value: "organizations, err := sc.Organization.ListOrganizations(\n  ctx,\n  &scalekit.ListOrganizationOptions{\n    PageSize: 10,\n  }\n)"}
                  }
                }
              },
              {
                struct_value: {
                  fields: {
                    key: "lang"
                    value: {string_value: "java"}
                  }
                  fields: {
                    key: "label"
                    value: {string_value: "Java SDK"}
                  }
                  fields: {
                    key: "source"
                    value: {string_value: "ListOrganizationsResponse organizations = scalekitClient.organizations().listOrganizations(10, \"\");"}
                  }
                }
              }
            ]
          }
        }
      }
    };
  }

  rpc SearchOrganization(SearchOrganizationsRequest) returns (SearchOrganizationsResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {get: "/api/v1/organizations:search"};

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organizations"
      summary: "Search organizations"
      description: "Searches for organizations in your environment using a query string. The query matches against organization name, ID, or external ID. Returns multiple results when more than one organization matches the criteria."
      responses: {
        key: "200"
        value: {
          description: "Returns a list of matching organizations and a page token for pagination if there are additional results."
          schema: {
            json_schema: {ref: ".scalekit.v1.organizations.SearchOrganizationsResponse"}
          }
        }
      }
    };
  }

  //Delete an Organization
  rpc DeleteOrganization(DeleteOrganizationRequest) returns (google.protobuf.Empty) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.http) = {
      delete: "/api/v1/organizations/{id}"

      // Hiding the access directly with external_id as it requires separate rpc method defined
      // additional_bindings: {delete: "/api/v1/organizations:external/{external_id}"}
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organizations"
      summary: "Delete an organization"
      description: "Remove an existing organization from the environment using its unique identifier"

      responses: {
        key: "200"
        value: {description: "Organization successfully deleted and no longer accessible"}
      }
    };
  }

  //Generate Portal Link for Org
  rpc GeneratePortalLink(GeneratePortalLinkRequest) returns (GeneratePortalLinkResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.http) = {put: "/api/v1/organizations/{id}/portal_links"};

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organizations"
      summary: "Generate admin portal link"
      description: "Creates a single use Admin Portal URL valid for 1 minute. Once the generated admin portal URL is accessed or rendered, a temporary session of 6 hours is created to allow the admin to update SSO/SCIM configuration."
      responses: {
        key: "200"
        value: {
          description: "Admin Portal link generated successfully. Returns the portal URL and expiration timestamp."
          schema: {
            json_schema: {ref: ".scalekit.v1.organizations.GeneratePortalLinkResponse"}
          }
        }
      }
    };
  }

  rpc DeletePortalLink(DeletePortalLinkRequest) returns (google.protobuf.Empty) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE};
    option (google.api.http) = {delete: "/api/v1/organizations/{id}/portal_links"};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Admin Portal"
      summary: "Delete portal link"
      description: "Revokes and deletes an Admin portal link."
      responses: {
        key: "200"
        value: {description: "Portal link deleted successfully"}
      }
    };
  }

  rpc DeletePortalLinkByID(DeletePortalLinkByIdRequest) returns (google.protobuf.Empty) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {delete: "/api/v1/organizations/{id}/portal_links/{link_id}"};

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Admin Portal"
      summary: "Delete admin portal link"
      description: "Revokes and deletes an Admin portal link."
      responses: {
        key: "200"
        value: {description: "Success"}
      }
    };
  }

  rpc GetPortalLinks(GetPortalLinkRequest) returns (GetPortalLinksResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {get: "/api/v1/organizations/{id}/portal_links"};

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Admin Portal"
      summary: "Get portal link"
      description: "Returns the Admin portal link if it exists. Use Generate Portal link to create and fetch a link"
      responses: {
        key: "200"
        value: {
          description: "Success"
          schema: {
            json_schema: {ref: ".scalekit.v1.organizations.GetPortalLinksResponse"}
          }
        }
      }
    };
  }

  rpc UpdateOrganizationSettings(UpdateOrganizationSettingsRequest) returns (GetOrganizationResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.http) = {
      patch: "/api/v1/organizations/{id}/settings"
      body: "settings"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organizations"
      summary: "Toggle organization settings"
      description: "Updates configuration settings for an organization. Supports modifying SSO configuration, directory synchronization settings, and session parameters. Requires organization ID and the specific settings to update."
      responses: {
        key: "200"
        value: {
          description: "Returns the complete organization object with updated settings applied. Contains all organization details including ID, display name, and the modified settings."
          schema: {
            json_schema: {ref: ".scalekit.v1.organizations.GetOrganizationResponse"}
          }
        }
      }
      responses: {
        key: "400"
        value: {description: "Invalid request - occurs when the settings payload contains invalid values or unsupported configuration"}
      }
      responses: {
        key: "404"
        value: {description: "Organization not found - the specified organization ID doesn't exist"}
      }
    };
  }

  rpc UpdateOrganizationSessionPolicy(UpdateOrganizationSessionPolicyRequest) returns (UpdateOrganizationSessionPolicyResponse) {
    option (scalekit.v1.options.auth_option) = {
      authentication_type: WORKSPACE_SESSION_CUSTOMER_PORTAL_CLIENT
      permissions: ["sk_org_session_policy_manage"]
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organizations"
      summary: "Update organization session policy"
      description: "Sets a custom session policy for an organization or reverts to application-level settings. Send policy_source='APPLICATION' to revert to application defaults. Send policy_source='CUSTOM' with timeout values to activate a custom policy. Values are accepted as-is; the system applies the stricter of application and organization values at session creation."
      responses: {
        key: "200"
        value: {description: "Session policy updated successfully."}
      }
      responses: {
        key: "404"
        value: {description: "Organization not found."}
      }
    };
    option (google.api.http) = {
      patch: "/api/v1/organizations/{organization_id}/session-policy"
      body: "policy"
    };
  }

  rpc GetOrganizationSessionPolicy(GetOrganizationSessionPolicyRequest) returns (GetOrganizationSessionPolicyResponse) {
    option (scalekit.v1.options.auth_option) = {
      authentication_type: WORKSPACE_SESSION_CUSTOMER_PORTAL_CLIENT
      permissions: ["sk_org_session_policy_read"]
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organizations"
      summary: "Get organization session policy"
      description: "Retrieves the session policy for an organization. Returns policy_source='APPLICATION' if the organization inherits the application-level defaults, or policy_source='CUSTOM' with the configured values if a custom policy is active."
      responses: {
        key: "200"
        value: {description: "Session policy retrieved successfully."}
      }
      responses: {
        key: "404"
        value: {description: "Organization not found."}
      }
    };
    option (google.api.http) = {get: "/api/v1/organizations/{organization_id}/session-policy"};
  }

  // Update user management setting for an organization
  rpc UpsertUserManagementSettings(UpsertUserManagementSettingsRequest) returns (UpsertUserManagementSettingsResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CUSTOMER_PORTAL_CLIENT};
    option (google.api.http) = {
      patch: "/api/v1/organizations/{organization_id}/settings/usermanagement"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organizations"
      summary: "Upsert organization user setting"
      description: "Upsert user management settings for an organization"
      responses: {
        key: "200"
        value: {
          description: "Returns the updated organization setting."
          schema: {
            json_schema: {ref: ".scalekit.v1.organizations.UpsertUserManagementSettingsResponse"}
          }
        }
      }
    };
  }

  rpc GetOrganizationUserManagementSetting(GetOrganizationUserManagementSettingsRequest) returns (GetOrganizationUserManagementSettingsResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CUSTOMER_PORTAL_CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {get: "/api/v1/organizations/{organization_id}/settings/usermanagement"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organizations"
      summary: "Get organization user management setting"
      description: "Retrieves the user management settings for a specific organization."
      responses: {
        key: "200"
        value: {
          description: "Returns the requested organization setting."
          schema: {
            json_schema: {ref: ".scalekit.v1.organizations.GetOrganizationUserManagementSettingsResponse"}
          }
        }
      }
    };
  }
}

message CreateOrganizationRequest {
  // Organization details
  CreateOrganization organization = 1 [
    (buf.validate.field).required = true,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "Required parameters for creating a new organization"}
  ];
}

message CreateOrganizationResponse {
  Organization organization = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "The newly created organization containing its ID, settings, and metadata"}];
}

message CreateOrganization {
  string display_name = 4 [
    (buf.validate.field).string = {
      min_len: 1
