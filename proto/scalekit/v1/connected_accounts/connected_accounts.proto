// Status of a connected account indicating its current state
enum ConnectorStatus {
  CONNECTION_STATUS_UNSPECIFIED = 0; // Default/unknown status
  ACTIVE = 1; // Account is connected and credentials are valid
  EXPIRED = 2; // Access token has expired and needs refresh
  PENDING_AUTH = 3; // Account awaiting user authorization (re-auth initiated)
  PENDING_VERIFICATION = 4; // OAuth complete; awaiting user identity verification before activation
  DISCONNECTED = 5; // Account has been manually disconnected
}

// Type of authentication mechanism used for the connected account
enum ConnectorType {
  CONNECTION_TYPE_UNSPECIFIED = 0; // Default/unknown type
  OAUTH = 1; // OAuth 2.0 authorization with access and refresh tokens
  API_KEY = 2; // Static API key authentication
  BASIC_AUTH = 3; // HTTP Basic Authentication (username/password)
  BEARER_TOKEN = 4; // Bearer token authentication
  CUSTOM = 5; // Custom authentication mechanism
  BASIC = 6; // Basic authentication (alias)
  OAUTH_M2M = 7; // OAuth 2.0 client credentials (machine-to-machine)
  TRELLO_OAUTH1 = 8; // Trello token-based OAuth1-style browser authorization
}

// Authentication credentials container supporting multiple auth types
message AuthorizationDetails {
  oneof details {
    OauthToken oauth_token = 1; // OAuth 2.0 credentials
    StaticAuth static_auth = 2; // Static authentication credentials
  }
}

// OAuth 2.0 access and refresh tokens with scopes
message OauthToken {
  string access_token = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "OAuth access token for API requests. Typically short-lived and must be refreshed after expiration."
    example: "\"ya29.a0AfH6SMBx...\""
  }];
  string refresh_token = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "OAuth refresh token for obtaining new access tokens. Long-lived and used to maintain persistent authorization."
    example: "\"1//0gHJxZ-Lb2...\""
  }];
  repeated string scopes = 3 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "List of granted OAuth scopes defining the permissions and access levels for this connection."
    example: "[\"https://www.googleapis.com/auth/drive.readonly\", \"https://www.googleapis.com/auth/userinfo.email\"]"
  }];
  string domain = 4 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Associated domain for workspace or organization-scoped OAuth connections (e.g., Google Workspace domain)."
    example: "\"example.com\""
  }];
}

// Static authentication credentials for API keys, bearer tokens, or basic auth
message StaticAuth {
  google.protobuf.Struct details = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Flexible JSON structure containing static credentials. Format varies by connector type (API key, username/password, etc.)."
    example: "{\"api_key\": \"sk_live_...\", \"api_secret\": \"...\"}"
  }];
}

