syntax = "proto3";

package scalekit.v1.environments;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/visibility.proto";
import "google/protobuf/any.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "scalekit/v1/commons/commons.proto";
import "scalekit/v1/connections/connections.proto";
import "scalekit/v1/options/options.proto";
import "scalekit/v1/organizations/organizations.proto";

option go_package = "github.com/scalekit-inc/scalekit/pkg/grpc/environments";

service EnvironmentService {
  rpc CreateEnvironment(CreateEnvironmentRequest) returns (CreateEnvironmentResponse) {
    option (scalekit.v1.options.auth_option) = {
      // special permission for SK default env
      authentication_type: WORKSPACE_CLIENT
    };
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {
      post: "/api/v1/environments"
      body: "environment"
    };
  }

  rpc UpdateEnvironment(UpdateEnvironmentRequest) returns (UpdateEnvironmentResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE};

    option (google.api.http) = {
      patch: "/api/v1/environments/{id}"
      body: "environment"
    };
  }

  rpc UpdateEnvironmentDomain(UpdateEnvironmentDomainRequest) returns (UpdateEnvironmentResponse) {
    option (scalekit.v1.options.auth_option) = {
      // special permission for SK default env
      authentication_type: WORKSPACE
    };

    option (google.api.http) = {
      patch: "/api/v1/environments/{id}:update"
      body: "environment"
    };
  }

  rpc GetEnvironment(GetEnvironmentRequest) returns (GetEnvironmentResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE};
    option (google.api.http) = {get: "/api/v1/environments/{id}"};
  }

  rpc ListEnvironment(ListEnvironmentsRequest) returns (ListEnvironmentsResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE};
    option (google.api.http) = {get: "/api/v1/environments"};
  }

  rpc DeleteEnvironment(DeleteEnvironmentRequest) returns (google.protobuf.Empty) {
    option (scalekit.v1.options.auth_option) = {
      // special permission for SK default env
      authentication_type: BLOCKED
    };

    option (google.api.http) = {delete: "/api/v1/environments/{id}"};
  }

  rpc GetRequiredDNSRecords(GetDNSRecordsRequest) returns (GetDNSRecordsResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.http) = {
      post: "/api/v1/environments/{id}/dns"
      body: "*"
    };
  }

  rpc VerifyDNSRecords(GetDNSRecordsRequest) returns (google.protobuf.Empty) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.http) = {
      post: "/api/v1/environments/{id}/dns:verify"
      body: "*"
    };
  }

  rpc CreateCustomDomain(CreateCustomDomainRequest) returns (CreateCustomDomainResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {
      post: "/api/v1/environments/{id}/custom-domains"
      body: "*"
    };
  }

  rpc CheckCustomDomainStatus(GetEnvironmentRequest) returns (GetEnvironmentResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {
      post: "/api/v1/environments/{id}/custom-domains:check"
      body: "*"
    };
  }

  rpc GenerateNewSamlCertificate(GenerateSamlCertificateRequest) returns (GenerateSamlCertificateResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {
      post: "/api/v1/environments/{id}/saml-certificates:generate"
      body: "*"
    };
  }
  rpc UpdatePortalCustomization(UpdatePortalCustomizationRequest) returns (UpdatePortalCustomizationResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {
      put: "/api/v1/environments/{id}/portal_customizations"
      body: "customization_settings"
      additional_bindings: [
        {
          put: "/api/v1/environments/{id}/customizations"
          body: "customization_settings"
        }
      ]
    };
  }

  rpc GetPortalCustomization(GetPortalCustomizationRequest) returns (GetPortalCustomizationResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CUSTOMER_PORTAL_ACTIONS_PORTAL};
    option (google.api.http) = {
      get: "/api/v1/portal_customizations"
      additional_bindings: [
        {get: "/api/v1/environments/-/portal_customizations"}]
    };
  }

  rpc CreateAssetUploadURL(CreateAssetUploadUrlRequest) returns (CreateAssetUploadUrlResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE};
    option (google.api.http) = {
      post: "/api/v1/environments/{id}/asset"
      body: "asset_settings"
    };
  }

  rpc UpdateFeatures(UpdateFeaturesRequest) returns (GetFeaturesResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE};
    option (google.api.http) = {
      put: "/api/v1/environments/{id}/features"
      body: "features"
    };
  }

  rpc EnableFSAFeature(EnableFSAFeatureRequest) returns (google.protobuf.Empty) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {
      post: "/api/v1/environments/{id}/features/fsa/enable"
      body: "*"
      additional_bindings: [
        {post: "/api/v1/features/fsa/enable"}]
    };
  }

  rpc DisableFSAFeature(google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {
      post: "/api/v1/features/fsa/disable"
      body: "*"
    };
  }

  rpc EnableFeature(EnableFeatureRequest) returns (google.protobuf.Empty) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CUSTOMER_PORTAL};
    option (google.api.http) = {post: "/api/v1/environments/{id}/features/{feature_id}:enable"};
  }

  rpc DisableFeature(DisableFeatureRequest) returns (google.protobuf.Empty) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CUSTOMER_PORTAL};
    option (google.api.http) = {post: "/api/v1/environments/{id}/features/{feature_id}:disable"};
  }

  rpc GetFeatures(GetFeaturesRequest) returns (GetFeaturesResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_SESSION_CLIENT};
    option (google.api.http) = {get: "/api/v1/features"};
  }

  // Returns allowlisted public feature flags for the environment implied by the request
  // host (typically HTTP Host). No environment id in path, query, or headers; unauthenticated.
  // 404 when the host does not resolve to an environment.
  rpc GetHostScopedPublicFeatureFlags(google.protobuf.Empty) returns (GetHostScopedPublicFeatureFlagsResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: NONE};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {get: "/api/v1/environments:publicFeatureFlags"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Environments"
      summary: "List host-scoped public feature flags"
      description: "Resolves the environment from the request host only (no environment path, query, or header). Returns allowlisted OpenFeature values; no bearer token. 404 if the host does not map to an environment."
      responses: {
        key: "200"
        value: {description: "Allowlisted flag keys and resolved values"}
      }
      responses: {
        key: "404"
        value: {description: "No environment resolved from host or workspace UI host"}
      }
    };
  }

  rpc CreateEnvironmentSessionSettings(CreateEnvironmentSessionSettingsRequest) returns (CreateEnvironmentSessionSettingsResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {
      post: "/api/v1/environments/{id}/session-settings"
      body: "session_settings"
    };
  }

  rpc CreateEnvironmentUserManagement(CreateEnvironmentUserManagementRequest) returns (CreateEnvironmentUserManagementResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {
      post: "/api/v1/environments/{id}/settings/user-management"
      body: "user_management"
    };
  }

  rpc GetEnvironmentSessionSettings(GetEnvironmentSessionSettingsRequest) returns (GetEnvironmentSessionSettingsResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_SESSION_CLIENT};
    option (google.api.http) = {get: "/api/v1/environments/{id}/session-settings"};
  }

  rpc GetEnvironmentUserManagement(GetEnvironmentUserManagementRequest) returns (GetEnvironmentUserManagementResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_SESSION_CLIENT};
    option (google.api.http) = {get: "/api/v1/environments/{id}/settings/user-management"};
  }

  rpc UpdateEnvironmentSessionSettings(UpdateEnvironmentSessionSettingsRequest) returns (UpdateEnvironmentSessionSettingsResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {
      patch: "/api/v1/environments/{id}/session-settings"
      body: "session_settings"
    };
  }

  rpc UpdateEnvironmentUserManagement(UpdateEnvironmentUserManagementRequest) returns (UpdateEnvironmentUserManagementResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {
      patch: "/api/v1/environments/{id}/settings/user-management"
      body: "user_management"
    };
  }

  rpc CreateAgentActionsConfig(CreateAgentActionsConfigRequest) returns (CreateAgentActionsConfigResponse) {
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE};
    option (google.api.http) = {
      post: "/api/v1/environments/{id}/settings/agent-actions"
      body: "agent_actions_config"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Environments"
      summary: "Create agent actions config"
      description: "Creates the agent actions configuration for an environment"
      responses: {
        key: "200"
        value: {description: "Agent actions config created successfully"}
      }
      responses: {
        key: "400"
        value: {description: "Invalid request - missing or invalid fields, or config already exists"}
      }
      responses: {
        key: "404"
        value: {description: "Environment not found"}
      }
    };
  }

  rpc GetAgentActionsConfig(GetAgentActionsConfigRequest) returns (GetAgentActionsConfigResponse) {
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE};
    option (google.api.http) = {get: "/api/v1/environments/{id}/settings/agent-actions"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Environments"
      summary: "Get agent actions config"
      description: "Retrieves the agent actions configuration for an environment."
      responses: {
        key: "200"
        value: {description: "Agent actions config retrieved successfully"}
      }
      responses: {
        key: "404"
        value: {description: "Environment or config not found"}
      }
    };
  }

  rpc UpdateAgentActionsConfig(UpdateAgentActionsConfigRequest) returns (UpdateAgentActionsConfigResponse) {
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE};
    option (google.api.http) = {
      patch: "/api/v1/environments/{id}/settings/agent-actions"
      body: "agent_actions_config"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Environments"
      summary: "Update agent actions config"
      description: "Updates the agent actions configuration for an environment"
      responses: {
        key: "200"
        value: {description: "Agent actions config updated successfully"}
      }
      responses: {
        key: "400"
        value: {description: "Invalid request - missing or invalid fields, or mode not allowed for this environment"}
      }
      responses: {
        key: "404"
        value: {description: "Environment not found"}
      }
    };
  }

  rpc GetContext(GetContextRequest) returns (GetContextResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE};
    option (google.api.http) = {get: "/api/v1/environments/{environment_id}/contexts"};
  }

  rpc UpdateContext(UpdateContextRequest) returns (google.protobuf.Empty) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE};
    option (google.api.http) = {
      put: "/api/v1/environments/{environment_id}/contexts"
      body: "context"
    };
  }

  rpc GetCurrentSession(GetCurrentSessionRequest) returns (GetCurrentSessionResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_SESSION_CUSTOMER_PORTAL_ACTIONS_PORTAL};
    option (google.api.http) = {
      get: "/api/v1/environments/{id}/sessions:me"
      additional_bindings: [
        {get: "/api/v1/environments/-/sessions:me"},
        {get: "/api/v1/sessions:me"}]
    };
  }

  rpc GetScalekitResources(ScalekitResourceRequest) returns (ScalekitResourceResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {
      post: "/api/v1/fetch:bulk"
      body: "*"
    };
  }

  rpc PortalBootstrap(PortalBootstrapRequest) returns (PortalBootstrapResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CUSTOMER_PORTAL};
    option (google.api.http) = {get: "/api/v1/portal/bootstrap"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Portal"
      summary: "Retrieve portal bootstrap data"
      description: "Returns all data needed to initialize the customer portal in a single request, combining session, portal customizations, organization, and connections."
      responses: {
        key: "200"
        value: {description: "Successfully retrieved portal bootstrap data"}
      }
      responses: {
        key: "401"
        value: {description: "Unauthorized - invalid or expired session"}
      }
    };
  }
}

message CreateCustomDomainRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
    prefix: "env"
  }];
  string custom_domain = 2 [
    (buf.validate.field).string = {
      min_len: 1
      max_len: 250
    },
    (buf.validate.field).required = true
  ];
}

message CreateCustomDomainResponse {
  Environment environment = 1;
}

message GetDNSRecordsRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
    prefix: "env"
  }];
  string custom_domain = 2 [
    (buf.validate.field).string = {
      min_len: 1
      max_len: 250
    },
    (buf.validate.field).required = true
  ];
}

message GetDNSRecordsResponse {
  repeated DNSRecords dns_records = 1;
}

message DNSRecords {
  string host_name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 250
  }];
  string type = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 250
  }];
  string value = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 250
  }];
}

message Environment {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
    prefix: "env"
  }];
  google.protobuf.Timestamp create_time = 2;
  google.protobuf.Timestamp update_time = 3;
  string display_name = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  string domain = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 250
  }];
  scalekit.v1.commons.RegionCode region_code = 6;
  scalekit.v1.commons.EnvironmentType type = 7;
  optional string custom_domain = 8;
  CustomDomainStatus custom_domain_status = 9;
} // workspace_id is not included here, It should derived from the token or domain via ctx.

enum CustomDomainStatus {
  UNSPECIFIED = 0;
  PENDING = 1;
  ACTIVE = 2;
  FAILED = 3;
  INITIAL = 4;
}

message CreateEnvironment {
  string display_name = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  reserved 5; // domain is not updatable here.
  optional scalekit.v1.commons.RegionCode region_code = 6;
  optional scalekit.v1.commons.EnvironmentType type = 7;
  optional scalekit.v1.commons.AuthenticationMode authentication_mode = 8 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "The authentication mode for the environment. The default is FULL_STACK_AUTH"}];
} // workspace_id is not included here, It should derived from the token or domain via ctx.

message UpdateEnvironment {
  optional string display_name = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 2000
  }];
  reserved 5; // domain is not updatable here.
  reserved 6; // region is not updatable here.
  reserved 7; // type is not updatable here.
}

message UpdateEnvironmentDomain {
  reserved 4; // display_name is not updatable here.
  optional string domain = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 250
  }];
}

message CreateEnvironmentRequest {
  CreateEnvironment environment = 1 [(buf.validate.field).required = true];
}

message CreateEnvironmentResponse {
  Environment environment = 1;
}

message UpdateEnvironmentRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
    prefix: "env"
  }];
  UpdateEnvironment environment = 2 [(buf.validate.field).required = true];
}

message UpdateEnvironmentDomainRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
    prefix: "env"
  }];
  UpdateEnvironmentDomain environment = 2 [(buf.validate.field).required = true];
}

message UpdateEnvironmentResponse {
  Environment environment = 1;
}

message GetEnvironmentRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
    prefix: "env"
  }];
}

message GetEnvironmentResponse {
  Environment environment = 1;
}

message ListEnvironmentsRequest {
  uint32 page_size = 1;
  string page_token = 2;
}

message ListEnvironmentsResponse {
  string next_page_token = 1;
  uint32 total_size = 2;
  repeated Environment environments = 3;
}

message DeleteEnvironmentRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
    prefix: "env"
  }];
}

message GenerateSamlCertificateRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
    prefix: "env"
  }];
}

message GenerateSamlCertificateResponse {
  string id = 1;
  string certificate = 2;
  int64 expiry = 3;
}

message UpdatePortalCustomizationResponse {
  string environmentId = 1;
  google.protobuf.Struct customization_settings = 2;
}

message UpdatePortalCustomizationRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
    prefix: "env"
  }];
  google.protobuf.Struct customization_settings = 2 [(buf.validate.field).required = true];
}

message GetPortalCustomizationRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 0
    max_len: 32
  }];
}

// PortalSettings contains settings and flags from two sources:
// - Workspace billing subscription (custom_branding): derived from the workspace's subscribed billing items
// - Feature rollout configuration (new_self_serve_sso_scim, enable_conn_delete): environment or workspace-age based feature flags
message PortalSettings {
  // custom_branding indicates whether the workspace has the Customization billing item enabled,
  // allowing custom portal branding (logos, colors, etc.)
  bool custom_branding = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Indicates whether custom portal branding is enabled for this workspace based on billing subscription"
    example: "true"
  }];
  // new_self_serve_sso_scim indicates whether the new self-serve SSO/SCIM flow
  // should be shown in the customer portal. This is rollout-driven (feature flag),
  // enabled for development environments or new workspaces (workspace_created_at >= cutoff),
  // not billing-derived.
  bool new_self_serve_sso_scim = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Indicates whether the new self-serve SSO/SCIM flow should be shown in the customer portal (rollout-driven, not billing-derived)"
    example: "false"
  }];
  // enable_conn_delete indicates whether connection deletion is enabled for this environment.
  // This is rollout-driven via environment ID allowlist (feature flag),
  // enabling per-environment granular control of the delete connection feature.
  bool enable_conn_delete = 3 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Indicates whether connection deletion is enabled for this environment (rollout-driven by environment allowlist)"
    example: "false"
  }];
}

message GetPortalCustomizationResponse {
  string environmentId = 1;
  google.protobuf.Struct customization_settings = 2 [(google.api.field_behavior) = OPTIONAL];
  // settings contains feature flags derived from the workspace's billing subscription and feature rollout configuration
  PortalSettings settings = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
}

message CreateAssetUploadUrlResponse {
  string upload_url = 1;
  string fetch_url = 2;
}

message CreateAssetUploadUrlRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
    prefix: "env"
  }];

  AssetSettings asset_settings = 2;
}

message AssetSettings {
  AssetCategory category = 1 [(buf.validate.field).required = true];
  string extension = 2 [(buf.validate.field).string = {
    in: [
      "jpg",
      "jpeg",
      "png"
    ]
  }];
}

// can be extended to support more asset types
enum AssetCategory {
  ASSET_CATEGORY_UNSPECIFIED = 0;
  PORTAL_CUSTOMIZATION_IMAGE = 1;
}

message UpdateFeaturesRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
    prefix: "env"
  }];
  repeated EnvironmentFeature features = 2 [(buf.validate.field).required = true];
}

message EnableFSAFeatureRequest {
  string id = 1 [(buf.validate.field).string = {max_len: 32}];
}

message DisableFSAFeatureRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
    prefix: "env"
  }];
}

message GetFeaturesRequest {
  string id = 1 [(buf.validate.field) = {
    ignore_empty: true
    string: {
      min_len: 1
      max_len: 32
      prefix: "env"
    }
  }];
}

message GetFeaturesResponse {
  repeated EnvironmentFeature features = 1;
}

message EnableFeatureRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
    prefix: "env"
  }];
  string feature_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
  }];
}

message DisableFeatureRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
    prefix: "env"
  }];
  string feature_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
  }];
}

message EnvironmentFeature {
  string name = 1;
  bool enabled = 2;
}

message GetHostScopedPublicFeatureFlagsResponse {
  repeated PublicHostFeatureFlag flags = 1;
}

message PublicHostFeatureFlag {
  string key = 1;
  google.protobuf.Value value = 2;
