message PortalCustomizationBootstrap {
  // Customization settings for branding and UI configuration
  google.protobuf.Struct customization_settings = 1 [(google.api.field_behavior) = OPTIONAL];
  // Settings contains feature flags derived from the workspace's billing subscription
  PortalSettings settings = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
}

message PortalBootstrapResponse {
  // Current session details including organization ID, expiry, and subject
  GetCurrentSessionResponse session = 1;
  // Portal customization settings for branding and UI configuration
  PortalCustomizationBootstrap portal_customizations = 2;
  // Organization details for the current portal session
  scalekit.v1.organizations.Organization organization = 3;
  // All connections configured for the organization
  repeated scalekit.v1.connections.ListConnection connections = 4;
}

