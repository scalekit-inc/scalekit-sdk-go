syntax = "proto3";

package scalekit.v1.providers;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/visibility.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "scalekit/v1/options/options.proto";

option go_package = "github.com/scalekit-inc/scalekit/pkg/grpc/providers";

// Service definition
service ProviderService {
  rpc CreateProvider(CreateProviderRequest) returns (CreateProviderResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: CLIENT}; //only for scalekit client
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {
      post: "/api/v1/providers"
      body: "provider"
    };
  }

  rpc CreateCustomProvider(CreateCustomProviderRequest) returns (CreateProviderResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.http) = {
      post: "/api/v1/custom-providers"
      body: "provider"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Providers"
      summary: "Create a custom provider"
      description: "Creates an environment-scoped custom provider with authentication patterns and proxy configuration. Use Provider.identifier from the response for subsequent update and delete operations."
      responses: {
        key: "201"
        value: {
          description: "Custom provider created successfully"
          schema: {
            json_schema: {ref: ".scalekit.v1.providers.CreateProviderResponse"}
          }
        }
      }
      responses: {
        key: "400"
        value: {description: "Bad Request - invalid custom provider payload"}
      }
      responses: {
        key: "500"
        value: {description: "Internal Server Error"}
      }
    };
  }

  rpc UpdateProvider(UpdateProviderRequest) returns (UpdateProviderResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {
      put: "/api/v1/providers/{identifier}"
      body: "provider"
    };
  }

  rpc UpdateCustomProvider(UpdateCustomProviderRequest) returns (UpdateProviderResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.http) = {
      put: "/api/v1/custom-providers/{identifier}"
      body: "provider"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Providers"
      summary: "Update a custom provider"
      description: "Updates an existing environment-scoped custom provider by identifier"
      responses: {
        key: "200"
        value: {
          description: "Custom provider updated successfully"
          schema: {
            json_schema: {ref: ".scalekit.v1.providers.UpdateProviderResponse"}
          }
        }
      }
      responses: {
        key: "400"
        value: {description: "Bad Request - invalid custom provider payload"}
      }
      responses: {
        key: "404"
        value: {description: "Not Found - custom provider does not exist"}
      }
      responses: {
        key: "500"
        value: {description: "Internal Server Error"}
      }
    };
  }

  rpc DeleteProvider(DeleteProviderRequest) returns (DeleteProviderResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {delete: "/api/v1/providers/{identifier}"};
  }

  rpc DeleteCustomProvider(DeleteProviderRequest) returns (DeleteProviderResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_CLIENT};
    option (google.api.http) = {delete: "/api/v1/custom-providers/{identifier}"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Providers"
      summary: "Delete a custom provider"
      description: "Deletes an environment-scoped custom provider by identifier"
      responses: {
        key: "200"
        value: {
          description: "Custom provider deleted successfully"
          schema: {
            json_schema: {ref: ".scalekit.v1.providers.DeleteProviderResponse"}
          }
        }
      }
      responses: {
        key: "404"
        value: {description: "Not Found - custom provider does not exist"}
      }
      responses: {
        key: "500"
        value: {description: "Internal Server Error"}
      }
    };
  }

  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse) {
    option (scalekit.v1.options.auth_option) = {authentication_type: WORKSPACE_ACTIONS_PORTAL_CLIENT};
    option (google.api.method_visibility).restriction = "PREVIEW";
    option (google.api.http) = {get: "/api/v1/providers"};
  }
}

// Provider represents a connected app provider
message Provider {
  string id = 1;
  string identifier = 2;
  string display_name = 3;
  string description = 4;
  repeated string categories = 5;
  google.protobuf.ListValue auth_patterns = 6;
  string icon_src = 7;
  int32 display_priority = 8;
  bool coming_soon = 9;
  string proxy_url = 10;
  bool proxy_enabled = 11;
  bool is_custom = 12 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Indicates whether the provider is environment-scoped (custom provider)"
    example: "false"
  }];
  bool is_custom_mcp = 13 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Indicates whether this is an environment-scoped MCP-based custom provider"
    example: "false"
  }];
}

message CreateProvider {
  reserved 1;
  string identifier = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 100
      pattern: "^[a-zA-Z0-9_-]*$"
    },
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Unique identifier for the connected app provider. Spaces are not allowed, and the character : is reserved for internal suffixing and cannot be used in input."
      example: "\"google_workspace\""
    }
  ];
  string display_name = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 200
    },
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Display name for the connected app provider"
      example: "\"Google Workspace\""
    }
  ];
  string description = 4 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Description of the connected app provider"
    example: "\"Connect to Google Workspace for email and calendar integration\""
  }];
  repeated string categories = 5 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Categories for the connected app provider"
    example: "[\"productivity\", \"email\"]"
  }];
  google.protobuf.ListValue auth_patterns = 6 [
    (buf.validate.field).required = true,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "Authentication patterns for the connected app provider"}
  ];
  string icon_src = 7 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Image source URL for the connected app provider"
    example: "\"https://example.com/images/google_workspace.png\""
  }];
  int32 display_priority = 8;
  bool coming_soon = 9 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Indicates if the connected app provider is coming soon"
    example: "false"
  }];
  string proxy_url = 10 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Proxy URL for the connected app provider"
    example: "\"https://workspace.google.com/\""
  }];
  bool proxy_enabled = 11 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "This flag indicates whether proxying is turned on for the connected app provider. When enabled, requests are routed through the provider proxy instead of being sent directly."
    example: "true"
  }];
}

// Create Provider
message CreateProviderRequest {
  CreateProvider provider = 1 [
    (buf.validate.field).required = true,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "Details of the connected app provider to create"}
  ];
}

message CreateCustomProvider {
  reserved 3, 5, 6;
  string display_name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 200
      pattern: "^[a-zA-Z0-9 ]*[a-zA-Z0-9][a-zA-Z0-9 ]*$"
    },
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Display name for the connected app provider"
      example: "\"Google Workspace\""
    }
  ];
  string description = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Description of the connected app provider"
    example: "\"Connect to Google Workspace for email and calendar integration\""
  }];
  google.protobuf.ListValue auth_patterns = 4 [
    (buf.validate.field).required = true,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "Authentication patterns for the connected app provider"}
  ];
  string proxy_url = 7 [
    (buf.validate.field).string = {
      pattern: "^https://"
      min_len: 1
      max_len: 2048
    },
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Proxy URL for the connected app provider. Must start with https://"
      example: "\"https://mcp.example.com/mcp\""
    }
  ];
  bool proxy_enabled = 8 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "This flag indicates whether proxying is turned on for the connected app provider. When enabled, requests are routed through the provider proxy instead of being sent directly."
    example: "true"
  }];
  string icon_src = 9 [
    (buf.validate.field).string = {
      pattern: "^(https://.*)?$"
      max_len: 2048
    },
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "URL for the provider icon. Should be an SVG image sized 800x800 pixels for best rendering experience."
      example: "\"https://example.com/images/my-connector.svg\""
    }
  ];
}

message CreateCustomProviderRequest {
  CreateCustomProvider provider = 1 [
    (buf.validate.field).required = true,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "Details of the custom connected app provider to create. Identifier is derived by the system and the identifier returned in the response must be used for update and delete operations."}
  ];
}

message CreateProviderResponse {
  Provider provider = 1;
}

message UpdateProvider {
  reserved 1, 2;
  string display_name = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 200
    },
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Display name for the connected app provider"
      example: "\"Google Workspace\""
    }
  ];
  string description = 4 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Description of the connected app provider"
    example: "\"Connect to Google Workspace for email and calendar integration\""
  }];
  repeated string categories = 5 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Categories for the connected app provider"
    example: "[\"productivity\", \"email\"]"
  }];
  google.protobuf.ListValue auth_patterns = 6 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "Authentication patterns for the connected app provider"}];
  string icon_src = 7 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Image source URL for the connected app provider"
    example: "\"https://example.com/images/google_workspace.png\""
  }];
  int32 display_priority = 8;
  google.protobuf.BoolValue coming_soon = 9 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Indicates if the connected app provider is coming soon"
    example: "false"
  }];
  string proxy_url = 10 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Proxy URL for the connected app provider"
    example: "\"https://workspace.google.com/\""
  }];
  google.protobuf.BoolValue proxy_enabled = 11 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Indicates if proxy is enabled for the connected app provider"
    example: "true"
  }];
}

// Update Provider
message UpdateProviderRequest {
  string identifier = 1 [
    (buf.validate.field).string = {
      min_len: 0
      max_len: 255
    },
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Identifier of the connected app provider to update."
      example: "\"google_workspace\""
    }
  ];
  UpdateProvider provider = 2 [
    (buf.validate.field).required = true,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "Fields to update for the connected app provider"}
  ];
}

message UpdateCustomProvider {
  reserved 3, 5, 6;
  string display_name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 200
      pattern: "^[a-zA-Z0-9 ]*[a-zA-Z0-9][a-zA-Z0-9 ]*$"
    },
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Display name for the connected app provider"
      example: "\"Google Workspace\""
    }
  ];
  string description = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Description of the connected app provider"
    example: "\"Connect to Google Workspace for email and calendar integration\""
  }];
  google.protobuf.ListValue auth_patterns = 4 [
    (buf.validate.field).required = true,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "Authentication patterns for the connected app provider"}
  ];
  string proxy_url = 7 [
    (buf.validate.field).string = {
      pattern: "^https://"
      min_len: 1
      max_len: 2048
    },
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Proxy URL for the connected app provider. Must start with https://"
      example: "\"https://mcp.example.com/mcp\""
    }
  ];
  bool proxy_enabled = 8 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "This flag indicates whether proxying is turned on for the connected app provider. When enabled, requests are routed through the provider proxy instead of being sent directly."
    example: "true"
  }];
  string icon_src = 9 [
    (buf.validate.field).string = {
      pattern: "^(https://.*)?$"
      max_len: 2048
    },
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "URL for the provider icon. Should be an SVG image sized 800x800 pixels for best rendering experience."
      example: "\"https://example.com/images/my-connector.svg\""
    }
  ];
}

message UpdateCustomProviderRequest {
  string identifier = 1 [
    (buf.validate.field).string = {
      min_len: 0
      max_len: 255
    },
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Identifier of the custom connected app provider to update."
      example: "\"GOOGLEWORKSPACE:12345\""
    }
  ];
  UpdateCustomProvider provider = 2 [
    (buf.validate.field).required = true,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "Fields to update for the custom connected app provider. This aligns with the create custom provider payload."}
  ];
}

message UpdateProviderResponse {
  Provider provider = 1;
}

enum ProviderType {
  DEFAULT = 0;
  CUSTOM = 1;
  ALL = 2;
}

// List Providers
message ListProvidersRequest {
  message Filter {
    // DEFAULT, CUSTOM, ALL
    ProviderType provider_type = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Provider type filter values: DEFAULT (0) returns default providers, CUSTOM (1) returns environment-scoped custom providers, and ALL (2) returns both default and custom providers."
      example: "1"
    }];
  }

  string identifier = 1 [(buf.validate.field).string = {
    min_len: 0
    max_len: 255
    pattern: "^[a-zA-Z0-9_:-]*$"
  }];
  uint32 page_size = 2;
  string page_token = 3;
  Filter filter = 4 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "Filters providers by type. DEFAULT (or omitted) keeps existing behavior. CUSTOM returns only environment-scoped providers. ALL returns both default (null environment) and current-environment custom providers. Any unsupported type returns an error."}];
}

message ListProvidersResponse {
  repeated Provider providers = 1;
  string next_page_token = 2;
  uint32 total_size = 3;
  string prev_page_token = 4;
}

message DeleteProviderRequest {
  string identifier = 1 [(buf.validate.field).string = {
    min_len: 0
    max_len: 255
  }];
}

message DeleteProviderResponse {}
